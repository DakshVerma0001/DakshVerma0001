name: Generate Blue Neon Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate blue to neon blue contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DakshVerma0001
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#00E5FF&color_dots=#EAF6FF,#BFDBFE,#7DD3FC,#38BDF8,#00E5FF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00E5FF&color_dots=#0B1120,#0E7490,#0284C7,#38BDF8,#00E5FF
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
