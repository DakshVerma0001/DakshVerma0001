# GitHub Action: Blue → Neon Blue Snake Animation
# Place this file at: .github/workflows/github-snake.yml
# This generates a custom cyberpunk blue-themed snake animation
# from your GitHub contribution graph.

name: Generate Contribution Snake

on:
  schedule:
    # Runs daily at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation (dark - neon blue)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DakshVerma0001
          outputs: |
            dist/github-snake-dark.svg?color_snake=#00E5FF&color_dots[]=0B1120,1D4ED8,2563EB,3B82F6,38BDF8,00E5FF&color_empty=#0B1120
          
      - name: Generate snake animation (light - royal blue)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DakshVerma0001
          outputs: |
            dist/github-snake-light.svg?color_snake=#2563EB&color_dots[]=EFF6FF,BFDBFE,93C5FD,60A5FA,3B82F6,2563EB&color_empty=#EFF6FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
