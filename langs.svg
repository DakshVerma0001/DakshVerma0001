<svg viewBox="0 0 320 195" xmlns="http://www.w3.org/2000/svg" width="320" height="195">
<defs>
  <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0B1120"/>
    <stop offset="100%" style="stop-color:#061428"/>
  </linearGradient>
  <linearGradient id="pyBar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#00E5FF"/>
    <stop offset="100%" style="stop-color:#2563EB"/>
  </linearGradient>
  <linearGradient id="jsBar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#38BDF8"/>
    <stop offset="100%" style="stop-color:#0EA5E9"/>
  </linearGradient>
  <linearGradient id="htmlBar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#3B82F6"/>
    <stop offset="100%" style="stop-color:#1D4ED8"/>
  </linearGradient>
  <linearGradient id="sqlBar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#06B6D4"/>
    <stop offset="100%" style="stop-color:#0891B2"/>
  </linearGradient>
  <linearGradient id="shellBar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#7DD3FC"/>
    <stop offset="100%" style="stop-color:#38BDF8"/>
  </linearGradient>
  <filter id="langGlow" x="-10%" y="-50%" width="120%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="cardL" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#00E5FF" flood-opacity="0.25"/>
  </filter>
</defs>

<g filter="url(#cardL)">
<rect width="320" height="195" rx="14" fill="url(#bgL)" stroke="#1D4ED8" stroke-width="1.5"/>
<rect width="320" height="195" rx="14" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.5" filter="url(#langGlow)"/>

<text x="160" y="30" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#00E5FF" text-anchor="middle" letter-spacing="2">TOP LANGUAGES</text>
<line x1="20" y1="40" x2="300" y2="40" stroke="#1D4ED8" stroke-width="0.8"/>

<!-- Python -->
<text x="25" y="62" font-family="'Courier New',monospace" font-size="10" fill="#94A3B8">Python</text>
<rect x="25" y="67" width="240" height="12" rx="6" fill="#0D2137"/>
<rect x="25" y="67" width="0" height="12" rx="6" fill="url(#pyBar)" filter="url(#langGlow)">
  <animate attributeName="width" values="0;192" dur="1.2s" begin="0.3s" fill="freeze"/>
</rect>
<text x="275" y="79" font-family="'Courier New',monospace" font-size="10" fill="#00E5FF" opacity="0">
  48%
  <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.5s" fill="freeze"/>
</text>

<!-- JavaScript -->
<text x="25" y="100" font-family="'Courier New',monospace" font-size="10" fill="#94A3B8">JavaScript</text>
<rect x="25" y="105" width="240" height="12" rx="6" fill="#0D2137"/>
<rect x="25" y="105" width="0" height="12" rx="6" fill="url(#jsBar)" filter="url(#langGlow)">
  <animate attributeName="width" values="0;144" dur="1.2s" begin="0.5s" fill="freeze"/>
</rect>
<text x="275" y="117" font-family="'Courier New',monospace" font-size="10" fill="#38BDF8" opacity="0">
  36%
  <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.7s" fill="freeze"/>
</text>

<!-- SQL -->
<text x="25" y="138" font-family="'Courier New',monospace" font-size="10" fill="#94A3B8">SQL</text>
<rect x="25" y="143" width="240" height="12" rx="6" fill="#0D2137"/>
<rect x="25" y="143" width="0" height="12" rx="6" fill="url(#sqlBar)" filter="url(#langGlow)">
  <animate attributeName="width" values="0;60" dur="1.2s" begin="0.7s" fill="freeze"/>
</rect>
<text x="275" y="155" font-family="'Courier New',monospace" font-size="10" fill="#06B6D4" opacity="0">
  15%
  <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.9s" fill="freeze"/>
</text>

<!-- Shell -->
<text x="25" y="176" font-family="'Courier New',monospace" font-size="10" fill="#94A3B8">Shell</text>
<rect x="25" y="181" width="240" height="12" rx="6" fill="#0D2137"/>
<rect x="25" y="181" width="0" height="12" rx="6" fill="url(#shellBar)" filter="url(#langGlow)">
  <animate attributeName="width" values="0;4" dur="1.2s" begin="0.9s" fill="freeze"/>
</rect>
<text x="275" y="193" font-family="'Courier New',monospace" font-size="10" fill="#7DD3FC" opacity="0">
  1%
  <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.1s" fill="freeze"/>
</text>

<rect width="320" height="195" rx="14" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.3"/>
</g>
</svg>
