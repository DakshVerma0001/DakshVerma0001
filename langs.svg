<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 282" width="420" height="282" role="img" aria-label="Top Languages">
<defs>
<style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
]]></style>

<!-- Animated Blue Gradient -->
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%">
        <animate attributeName="stop-color"
            values="#00E5FF;#38BDF8;#2563EB;#00E5FF"
            dur="6s"
            repeatCount="indefinite"/>
    </stop>

    <stop offset="100%">
        <animate attributeName="stop-color"
            values="#2563EB;#60A5FA;#00E5FF;#2563EB"
            dur="6s"
            repeatCount="indefinite"/>
    </stop>
</linearGradient>

<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#38BDF8" stop-opacity=".08"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>

<clipPath id="cardc">
    <rect x="1" y="1" width="418" height="280" rx="14"/>
</clipPath>

<clipPath id="stackc">
    <rect x="20" y="58" width="0" height="11" rx="5.5">
        <animate
            attributeName="width"
            from="0"
            to="380"
            dur="1.4s"
            begin=".4s"
            fill="freeze"
            calcMode="spline"
            keySplines=".2 .8 .3 1"/>
    </rect>
</clipPath>

</defs>

<!-- Card -->
<rect
    x="1"
    y="1"
    width="418"
    height="280"
    rx="14"
    fill="#08111F"
    stroke="url(#tg)"
    stroke-width="1.5"/>

<!-- Title -->
<text
    x="20"
    y="34"
    font-size="16"
    font-weight="bold"
    fill="url(#tg)">
📊 Top Languages
</text>

<!-- Top Stacked Bar -->
<g clip-path="url(#stackc)">
    <!-- Total width = 380 -->
    <!-- Python 50% = 190 -->
    <rect x="20" y="58" width="190" height="11" fill="#4dd8ff"/>

    <!-- JavaScript 30% = 114 -->
    <rect x="210" y="58" width="114" height="11" fill="#F7DF1E"/>

    <!-- TypeScript 10% = 38 -->
    <rect x="324" y="58" width="38" height="11" fill="#3178C6"/>

    <!-- HTML 10% = 38 -->
    <rect x="362" y="58" width="38" height="11" fill="#E34F26"/>
</g>

<!-- Python -->
<g class="row" style="animation-delay:.9s">

    <circle cx="26" cy="91" r="5" fill="#00E5FF"/>

    <text
        x="40"
        y="96"
        font-size="13"
        fill="#E6EDF3"
        font-weight="bold">
        Python
    </text>

    <text
        x="396"
        y="96"
        text-anchor="end"
        font-size="13"
        fill="#4dd8ff"
        font-weight="bold">
        50.0%
    </text>

    <rect
        x="40"
        y="104"
        width="268"
        height="9"
        rx="4.5"
        fill="#11243E"/>

    <!-- 50% of 268 = 134 -->
    <rect
        x="40"
        y="104"
        width="134"
        height="9"
        rx="4.5"
        fill="#4dd8ff">

        <animate
            attributeName="width"
            from="0"
            to="134"
            dur="1.1s"
            begin="1.05s"
            fill="freeze"/>
    </rect>

</g>

<!-- JavaScript -->
<g class="row" style="animation-delay:1.25s">

    <circle cx="26" cy="133" r="5" fill="#F7DF1E"/>

    <text
        x="40"
        y="138"
        font-size="13"
        fill="#E6EDF3"
        font-weight="bold">
        JavaScript
    </text>

    <text
        x="396"
        y="138"
        text-anchor="end"
        font-size="13"
        fill="#F7DF1E"
        font-weight="bold">
        30.0%
    </text>

    <rect
        x="40"
        y="146"
        width="268"
        height="9"
        rx="4.5"
        fill="#11243E"/>

    <!-- 30% of 268 = 80.4 -->
    <rect
        x="40"
        y="146"
        width="80.4"
        height="9"
        rx="4.5"
        fill="#F7DF1E">

        <animate
            attributeName="width"
            from="0"
            to="80.4"
            dur="1.1s"
            begin="1.40s"
            fill="freeze"/>
    </rect>

</g>

<!-- TypeScript -->
<g class="row" style="animation-delay:1.6s">

    <circle cx="26" cy="175" r="5" fill="#3178C6"/>

    <text
        x="40"
        y="180"
        font-size="13"
        fill="#E6EDF3"
        font-weight="bold">
        TypeScript
    </text>

    <text
        x="396"
        y="180"
        text-anchor="end"
        font-size="13"
        fill="#3178C6"
        font-weight="bold">
        10.0%
    </text>

    <rect
        x="40"
        y="188"
        width="268"
        height="9"
        rx="4.5"
        fill="#11243E"/>

    <!-- 10% of 268 = 26.8 -->
    <rect
        x="40"
        y="188"
        width="26.8"
        height="9"
        rx="4.5"
        fill="#3178C6">

        <animate
            attributeName="width"
            from="0"
            to="26.8"
            dur="1.1s"
            begin="1.75s"
            fill="freeze"/>
    </rect>

</g>

<!-- HTML -->
<g class="row" style="animation-delay:1.95s">

    <circle cx="26" cy="217" r="5" fill="#E34F26"/>

    <text
        x="40"
        y="222"
        font-size="13"
        fill="#E6EDF3"
        font-weight="bold">
        HTML
    </text>

    <text
        x="396"
        y="222"
        text-anchor="end"
        font-size="13"
        fill="#E34F26"
        font-weight="bold">
        10.0%
    </text>

    <rect
        x="40"
        y="230"
        width="268"
        height="9"
        rx="4.5"
        fill="#11243E"/>

    <!-- 10% of 268 = 26.8 -->
    <rect
        x="40"
        y="230"
        width="26.8"
        height="9"
        rx="4.5"
        fill="#E34F26">

        <animate
            attributeName="width"
            from="0"
            to="26.8"
            dur="1.1s"
            begin="2.10s"
            fill="freeze"/>
    </rect>

</g>

<!-- Shine Effect -->
<g clip-path="url(#cardc)">
    <rect
        class="sh"
        x="0"
        y="0"
        width="100"
        height="282"
        fill="url(#shg)"
        transform="skewX(-15)"/>
</g>

</svg>