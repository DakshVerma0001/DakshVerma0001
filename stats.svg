<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200" role="img" aria-label="Daksh Verma's GitHub stats">
<defs>
<style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rankPulse{0%,100%{opacity:.85}50%{opacity:1}}
@keyframes shineX{0%{transform:translateX(-160px) skewX(-15deg)}60%,100%{transform:translateX(560px) skewX(-15deg)}}
.row{opacity:0;animation:fadeSlide .5s ease forwards}
.rk{animation:rankPulse 2.4s ease-in-out infinite}
.sh{animation:shineX 4.5s ease-in-out 2.4s infinite}
]]></style>

<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%">
        <animate attributeName="stop-color"
            values="#00E5FF;#38BDF8;#2563EB;#00E5FF"
            dur="6s"
            repeatCount="indefinite"/>
    </stop>

    <stop offset="100%">
        <animate attributeName="stop-color"
            values="#2563EB;#60A5FA;#00E5FF;#2563EB"
            dur="6s"
            repeatCount="indefinite"/>
    </stop>
</linearGradient>

<linearGradient id="ringg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#00E5FF"/>
    <stop offset="100%" stop-color="#2563EB"/>
</linearGradient>

<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#38BDF8" stop-opacity=".08"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>

<clipPath id="cc">
    <rect x="1" y="1" width="498" height="198" rx="14"/>
</clipPath>

<filter id="g">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>

</defs>

<rect
    x="1"
    y="1"
    width="498"
    height="198"
    rx="14"
    fill="#08111F"
    stroke="url(#tg)"
    stroke-width="1.5"/>

<text
    x="24"
    y="38"
    font-size="16"
    font-weight="bold"
    fill="url(#tg)">
    🚀 Daksh Verma's GitHub Stats
</text>

<!-- Stars -->

<g class="row" style="animation-delay:.5s">
    <text x="24" y="74" font-size="14">⭐</text>
    <text x="52" y="74" font-size="13.5" fill="#c9d1d9">Total Stars Earned:</text>
    <text x="316" y="74" text-anchor="end" font-size="14" font-weight="bold" fill="#FACC15">18</text>
</g>

<!-- Commits -->

<g class="row" style="animation-delay:.75s">
    <text x="24" y="105" font-size="14">💻</text>
    <text x="52" y="105" font-size="13.5" fill="#c9d1d9">Total Commits:</text>
    <text x="316" y="105" text-anchor="end" font-size="14" font-weight="bold" fill="#38BDF8">200+</text>
</g>

<!-- Repositories -->

<g class="row" style="animation-delay:1s">
    <text x="24" y="136" font-size="14">📦</text>
    <text x="52" y="136" font-size="13.5" fill="#c9d1d9">Public Repositories:</text>
    <text x="316" y="136" text-anchor="end" font-size="14" font-weight="bold" fill="#4ADE80">15+</text>
</g>

<!-- Followers -->

<g class="row" style="animation-delay:1.25s">
    <text x="24" y="167" font-size="14">👥</text>
    <text x="52" y="167" font-size="13.5" fill="#c9d1d9">Followers:</text>
    <text x="316" y="167" text-anchor="end" font-size="14" font-weight="bold" fill="#60A5FA">0 (sadly)</text>
</g>

<!-- Rank -->

<g transform="translate(408,118)">

    <circle
        r="52"
        fill="none"
        stroke="#11243E"
        stroke-width="9"/>

    <circle
        r="52"
        fill="none"
        stroke="url(#ringg)"
        stroke-width="9"
        stroke-linecap="round"
        stroke-dasharray="254.8 326.7"
        stroke-dashoffset="254.8"
        transform="rotate(-90)">

        <animate
            attributeName="stroke-dashoffset"
            from="254.8"
            to="0"
            dur="1.6s"
            begin=".6s"
            fill="freeze"/>
    </circle>

    <text
        class="rk"
        y="14"
        text-anchor="middle"
        font-size="40"
        font-weight="bold"
        fill="#00E5FF"
        filter="url(#g)">
        A
    </text>

    <text
        y="70"
        text-anchor="middle"
        font-size="10.5"
        fill="#8b949e"
        opacity="0"
        style="animation:fadeIn .5s ease 1.8s forwards">
        RANK
    </text>

</g>

<g clip-path="url(#cc)">
    <rect
        class="sh"
        x="0"
        y="0"
        width="120"
        height="200"
        fill="url(#shg)"/>
</g>

</svg>