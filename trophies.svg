<svg viewBox="0 0 800 155" xmlns="http://www.w3.org/2000/svg" width="800" height="155">
<defs>
  <linearGradient id="bgT" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0B1120"/>
    <stop offset="100%" style="stop-color:#061428"/>
  </linearGradient>
  <linearGradient id="trophyGold" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#00E5FF"/>
    <stop offset="50%" style="stop-color:#38BDF8"/>
    <stop offset="100%" style="stop-color:#2563EB"/>
  </linearGradient>
  <linearGradient id="holoT" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0"/>
    <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
    <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0"/>
  </linearGradient>
  <filter id="tGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="cardT" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#00E5FF" flood-opacity="0.2"/>
  </filter>
</defs>

<g filter="url(#cardT)">
<rect width="800" height="155" rx="14" fill="url(#bgT)" stroke="#1D4ED8" stroke-width="1.5"/>

<text x="400" y="24" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#00E5FF" text-anchor="middle" letter-spacing="2">GITHUB TROPHIES</text>
<line x1="20" y1="32" x2="780" y2="32" stroke="#1D4ED8" stroke-width="0.8"/>

<!-- Trophy cells - 6 in a row -->
<!-- Each trophy: icon, label, value -->
<!-- Trophy 1: Commits -->
<g opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/>
  <rect x="12" y="40" width="115" height="102" rx="10" fill="#0D2137" stroke="#1D4ED8" stroke-width="1.2"/>
  <rect x="12" y="40" width="115" height="102" rx="10" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4" filter="url(#tGlow)"/>
  <!-- Trophy icon -->
  <text x="69" y="85" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="url(#trophyGold)">🏆</text>
  <text x="69" y="105" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" text-anchor="middle">Commits</text>
  <text x="69" y="120" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#00E5FF" text-anchor="middle">850+</text>
  <text x="69" y="135" font-family="'Courier New',monospace" font-size="7.5" fill="#64748B" text-anchor="middle">All Time</text>
  <!-- Holo shine sweep -->
  <rect x="12" y="40" width="40" height="102" rx="10" fill="url(#holoT)" opacity="0">
    <animate attributeName="x" values="-8;127;-8" dur="3s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="2s"/>
  </rect>
</g>

<!-- Trophy 2: Stars -->
<g opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.4s" fill="freeze"/>
  <rect x="140" y="40" width="115" height="102" rx="10" fill="#0D2137" stroke="#1D4ED8" stroke-width="1.2"/>
  <rect x="140" y="40" width="115" height="102" rx="10" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4" filter="url(#tGlow)"/>
  <text x="197" y="85" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="url(#trophyGold)">⭐</text>
  <text x="197" y="105" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" text-anchor="middle">Stars</text>
  <text x="197" y="120" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#00E5FF" text-anchor="middle">70+</text>
  <text x="197" y="135" font-family="'Courier New',monospace" font-size="7.5" fill="#64748B" text-anchor="middle">Total Earned</text>
  <rect x="140" y="40" width="40" height="102" rx="10" fill="url(#holoT)" opacity="0">
    <animate attributeName="x" values="120;265;120" dur="3s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="2.5s"/>
  </rect>
</g>

<!-- Trophy 3: Repos -->
<g opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
  <rect x="268" y="40" width="115" height="102" rx="10" fill="#0D2137" stroke="#1D4ED8" stroke-width="1.2"/>
  <rect x="268" y="40" width="115" height="102" rx="10" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.4" filter="url(#tGlow)"/>
  <text x="325" y="85" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="url(#trophyGold)">📁</text>
  <text x="325" y="105" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" text-anchor="middle">Repos</text>
  <text x="325" y="120" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#38BDF8" text-anchor="middle">20+</text>
  <text x="325" y="135" font-family="'Courier New',monospace" font-size="7.5" fill="#64748B" text-anchor="middle">Public</text>
  <rect x="268" y="40" width="40" height="102" rx="10" fill="url(#holoT)" opacity="0">
    <animate attributeName="x" values="248;393;248" dur="3s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="3s"/>
  </rect>
</g>

<!-- Trophy 4: PRs -->
<g opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
  <rect x="396" y="40" width="115" height="102" rx="10" fill="#0D2137" stroke="#1D4ED8" stroke-width="1.2"/>
  <rect x="396" y="40" width="115" height="102" rx="10" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4" filter="url(#tGlow)"/>
  <text x="453" y="85" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="url(#trophyGold)">🔀</text>
  <text x="453" y="105" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" text-anchor="middle">Pull Requests</text>
  <text x="453" y="120" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#00E5FF" text-anchor="middle">60+</text>
  <text x="453" y="135" font-family="'Courier New',monospace" font-size="7.5" fill="#64748B" text-anchor="middle">Merged</text>
  <rect x="396" y="40" width="40" height="102" rx="10" fill="url(#holoT)" opacity="0">
    <animate attributeName="x" values="376;521;376" dur="3s" repeatCount="indefinite" begin="3.5s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="3.5s"/>
  </rect>
</g>

<!-- Trophy 5: Issues -->
<g opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
  <rect x="524" y="40" width="115" height="102" rx="10" fill="#0D2137" stroke="#1D4ED8" stroke-width="1.2"/>
  <rect x="524" y="40" width="115" height="102" rx="10" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.4" filter="url(#tGlow)"/>
  <text x="581" y="85" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="url(#trophyGold)">🐛</text>
  <text x="581" y="105" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" text-anchor="middle">Issues</text>
  <text x="581" y="120" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#38BDF8" text-anchor="middle">50+</text>
  <text x="581" y="135" font-family="'Courier New',monospace" font-size="7.5" fill="#64748B" text-anchor="middle">Opened</text>
  <rect x="524" y="40" width="40" height="102" rx="10" fill="url(#holoT)" opacity="0">
    <animate attributeName="x" values="504;649;504" dur="3s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="4s"/>
  </rect>
</g>

<!-- Trophy 6: Streak -->
<g opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
  <rect x="652" y="40" width="135" height="102" rx="10" fill="#0D2137" stroke="#1D4ED8" stroke-width="1.2"/>
  <rect x="652" y="40" width="135" height="102" rx="10" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4" filter="url(#tGlow)"/>
  <text x="719" y="85" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="url(#trophyGold)">🔥</text>
  <text x="719" y="105" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" text-anchor="middle">Current Streak</text>
  <text x="719" y="120" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#00E5FF" text-anchor="middle">30+ days</text>
  <text x="719" y="135" font-family="'Courier New',monospace" font-size="7.5" fill="#64748B" text-anchor="middle">Keep Going!</text>
  <rect x="652" y="40" width="40" height="102" rx="10" fill="url(#holoT)" opacity="0">
    <animate attributeName="x" values="632;797;632" dur="3s" repeatCount="indefinite" begin="4.5s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="4.5s"/>
  </rect>
</g>

<rect width="800" height="155" rx="14" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.3"/>
</g>
</svg>
